name: slm
channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults

dependencies:
  - python=3.11
  - pip

  - pip:
    # Core
    - torch==2.5.1
    - torchvision==0.20.1
    - torchaudio==2.5.1

    # Tokenizer
    - tokenizers==0.23.1

    # Data pipeline
    - datasets==5.0.0
    - radon==6.0.1
    - datasketch==1.10.0
    - tqdm==4.67.3
    - numpy==2.0.1
    - pyarrow==24.0.0

    # Training
    - wandb==0.27.1
    - pyyaml==6.0.3

    # Eval
    - human-eval==1.0.3

    # Dev / testing
    - pytest==9.0.3
    - pytest-cov==5.0.0
    - black==26.5.1
    - ruff==0.15.16
    - pre-commit==4.6.0
