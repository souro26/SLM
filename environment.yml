name: slm
channels:
  - pytorch
  - nvidia
  - conda-forge
  - defaults

dependencies:
  - python=3.11
  - pip

  - pip:
    # Core
    - torch==2.3.0
    - torchvision==0.18.0

    # Tokenizer
    - tokenizers==0.19.1

    # Data pipeline
    - datasets==2.19.1
    - radon==6.0.1
    - datasketch==1.6.5
    - tqdm==4.66.4
    - numpy==1.26.4
    - pyarrow==16.1.0

    # Training
    - wandb==0.17.0
    - pyyaml==6.0.1

    # Eval
    - human-eval==1.0.3

    # Dev / testing
    - pytest==8.2.0
    - pytest-cov==5.0.0
    - black==24.4.2
    - ruff==0.4.4
    - pre-commit==3.7.1